# ============================================================
# UniBots configuration
# Edit this file to switch between simulation and real bot.
# ============================================================

# Input mode for all sensors: "sim" or "real" (sensor creators use this internally)
input_mode: "sim"

# --- Pi / real camera ---
pi_ip: "127.0.0.1" # use 127.0.0.1 when running on Pi
pi_front_url: "" # default: http://{pi_ip}:8080/?action=stream
pi_rear_url: "" # default: http://{pi_ip}:8081/?action=stream

# --- Frame (model input size) ---
# Both Unity and Pi frames use this size. Unity sends at this resolution; Pi frames are resized.
frame_width: 640
frame_height: 480

# --- Unity / simulation ---
# unity_host: "192.168.137.1"
unity_host: "127.0.0.1"
unity_port: 6000
unity_front_host: "" # default: unity_host
unity_front_port: 6000
unity_rear_port: 6002 # placeholder until Unity supports dual streams
unity_frame_queue_maxsize: 3

# --- IMU (optional) ---
use_imu: false

# --- Model ---
# PyTorch (.pt): "Ball Detection/yolo11n.pt" or path to .pt file
# NCNN: "model/yolo11n_ncnn_model" (folder with .param, .bin, metadata.yaml)
# model_path: "model/yolo11n_ncnn_model"
model_path: "model/yolopt_model/last.pt"
conf_threshold: 0.5

# --- Homing ---
# Home zone: where the bot is initially placed. Set before each match based on arena assignment.
home_zone: "North" # North | South | East | West

# --- Actuators (motor, speaker) ---
actuator_mode: "sim" # "sim" or "real"

# --- Output / Debug (frame sink) ---
debug_start_state: "GO_TO_HOME"  # optional: start FSM in this state for testing (e.g. GO_TO_HOME, SEARCH_BALL)
headless: true # true = TCP stream to viewer, false = local window
stream_viewer_port: 6001
stream_send_every_n_frames: 2
jpeg_quality: 85
window_name: "YOLO Ping Pong Greedy Path"
